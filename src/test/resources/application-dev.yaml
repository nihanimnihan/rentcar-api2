# Test-only override for the dev profile datasource.
# Takes precedence over src/main/resources/application-dev.yaml during the Maven test lifecycle.
# H2 is scope=test so it is available here but NOT in the production JAR or spring-boot:run.
spring:
  datasource:
    url: jdbc:h2:mem:rentcardb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
