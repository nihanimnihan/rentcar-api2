<!DOCTYPE html>
<html lang="en" data-x="html" data-x-toggle="html-overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/vendors.css">
    <link rel="stylesheet" href="css/main.css">

    <style>
        .transfer-passengers-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 160px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
            z-index: 100;
            overflow: hidden;
        }
        .transfer-passengers-dropdown ul {
            list-style: none;
            margin: 0;
            padding: 6px 0;
        }
        .transfer-passengers-dropdown li {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 14px;
            color: #051036;
        }
        .transfer-passengers-dropdown li:hover,
        .transfer-passengers-dropdown li.is-active {
            background: #EBF0FB;
            color: #3554D1;
        }
    </style>

    <title>Airport Transfer Offers | RentCar</title>
</head>

<body>
<main class="transfer-offers-page">

    <div id="minimal-header-placeholder"></div>

    <section class="transfer-offers-summary">
        <div class="container">
            <div class="transfer-offers-summary-grid">

                <div class="transfer-summary-item">
                    <div class="transfer-summary-label" data-i18n="transfer.pickupAt">PICKUP AT</div>
                    <div class="transfer-summary-value">
                        <i class="icon-search text-20"></i>
                        Barcelona Airport T1
                    </div>
                </div>

                <div class="transfer-summary-item">
                    <div class="transfer-summary-label" data-i18n="transfer.bookByHour">BOOK BY THE HOUR</div>
                    <div class="transfer-summary-value" id="selectedTransferDuration">
                        1 hour (30 km included)
                    </div>
                </div>

                <div class="transfer-summary-item">
                    <div class="transfer-summary-label" data-i18n="transfer.pickupDateTime">PICKUP DATE / TIME</div>
                    <div class="transfer-summary-value">
                        <span>16/05/2026</span>
                        <span>10:00</span>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section class="transfer-offers-meta">
        <div class="container">
            <span data-i18n="transfer.duration">Duration</span>
            <strong>est. 1 hrs</strong>
        </div>
    </section>

    <section class="transfer-offers-list-section">
        <div class="container">

            <div id="transferOffersCount" class="transfer-offers-toolbar">
                <div>
                    <strong id="transferOffersCountNum">—</strong>
                    <span data-i18n="transfer.offers">Offer(s)</span>
                </div>

                <div class="transfer-toolbar-actions">
                    <button id="sortToggleBtn" type="button" class="button -blue-1 h-40 px-20 rounded-100 bg-blue-1-05 text-15 text-blue-1">
                        <span id="sortArrow">↑</span>
                        <span id="sortLabel" data-i18n="transfer.priceLowHigh">Price low to high</span>
                    </button>

                    <div class="transfer-passengers-wrapper" style="position:relative;display:inline-block;">
                        <button id="passengersBtn" type="button" class="button -blue-1 h-40 px-20 rounded-100 bg-blue-1-05 text-15 text-blue-1">
                            <i class="icon-filter text-16"></i>
                            <span id="passengersLabel" data-i18n="transfer.passengers">1+ Passengers</span>
                        </button>
                        <div id="passengersDropdown" class="transfer-passengers-dropdown" style="display:none;">
                            <ul>
                                <li data-value="1">1+ Passengers</li>
                                <li data-value="2">2+ Passengers</li>
                                <li data-value="3">3+ Passengers</li>
                                <li data-value="4">4+ Passengers</li>
                                <li data-value="5">5+ Passengers</li>
                                <li data-value="6">6+ Passengers</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div id="transferOffersGrid" class="transfer-offers-grid">
                <div id="transferOffersLoading" style="text-align:center;padding:2rem;">
                    <span data-i18n="common.loading">Loading…</span>
                </div>
            </div>
        </div>
    </section>

    <div id="minimal-footer-placeholder"></div>

</main>

<div id="language-modal-placeholder"></div>

<script src="js/i18n/en.js"></script>
<script src="js/i18n/es.js"></script>
<script src="js/i18n/i18n.js"></script>
<script src="js/vendors.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script src="js/airport-transfer-offers.js"></script>
</body>
</html>
