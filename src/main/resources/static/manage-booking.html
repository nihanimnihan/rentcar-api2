<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/vendors.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/alerts.css">
    <link rel="stylesheet" href="css/components/manage-booking.css">
    <link rel="stylesheet" href="css/brand-theme.css?v=20260619-header">
    <link rel="stylesheet" href="css/auth-session.css">
    <title>Manage booking</title>
</head>

<body>
<main>
    <section class="py-20 bg-dark-3 rc-simple-header">
        <div class="container">
            <div class="row justify-between items-center">

                <div class="col-auto">
                    <div class="d-flex items-center rc-simple-header__brand">
                        <button type="button"
                                onclick="history.back()"
                                class="button -blue-1 size-40 rounded-full bg-white-10 mr-15 text-white rc-simple-header__back">
                            <i class="icon-arrow-left text-18"></i>
                        </button>
                        <a href="index.html" class="header-logo">
                            <img src="img/general/logo-light.svg" alt="RentCar logo">
                        </a>
                    </div>
                </div>

                <div class="col-auto">
                    <div class="d-flex items-center x-gap-20 rc-simple-header__actions">
                        <button class="d-flex items-center text-14 text-white js-lang-toggle" type="button">
                            <img src="img/general/lang.png" alt="language" class="rounded-full mr-10" style="width:20px;height:20px">
                            <span data-i18n-lang-label>English</span>
                            <i class="icon-chevron-sm-down text-7 ml-10"></i>
                        </button>
                        <a href="signup.html" class="rc-header-auth-link" data-i18n="header.signIn">
                            Sign In / Register
                        </a>
                        <a href="signup.html"
                           class="rc-simple-header__user-icon icon-user"
                           aria-label="Sign In / Register">
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section class="layout-pt-xl layout-pb-xl">
        <div class="container">
            <div class="row justify-center">
                <div class="col-xl-4 col-lg-5 col-md-8">

                    <!-- Collapsed summary row — hidden until a booking is found -->
                    <div id="mfCollapsedHeader" class="manage-booking-collapsed-header" style="display:none">
                        <div class="manage-booking-collapsed-header__info">
                        <div class="manage-booking-collapsed-header__label" data-i18n="manage.title">Manage your booking</div>
                        <div class="manage-booking-collapsed-header__ref" id="mfCollapsedRef"></div>
                        </div>
                        <button id="mfChangeBtn" type="button" class="manage-booking-change-btn" data-i18n="manage.change">
                        Change
                        </button>
                    </div>

                    <!-- Full form panel — shown initially, collapsed after successful lookup -->
                    <div id="mfFormPanel">
                        <a href="index.html" class="d-inline-flex items-center mb-30">
                        <i class="icon-chevron-left text-20 mr-10"></i>
                        </a>

                        <h1 class="text-30 fw-700 mb-15" data-i18n="manage.title">
                        Manage your booking
                        </h1>

                        <p class="text-16 text-dark-1 mb-30" data-i18n="manage.description">
                        Access your rental with your booking reference and last name.
                        </p>

                        <form id="manageForm">
                        <div class="mb-20">
                            <label class="text-14 fw-600 mb-8 d-block" data-i18n="manage.bookingNumber">
                                Booking reference number
                            </label>
                            <input id="mfReference"
                                   class="border-light rounded-8 px-20 py-15"
                                   type="text"
                                   placeholder="Booking reference number"
                                   data-i18n-placeholder="manage.bookingNumberPlaceholder">
                        </div>

                        <div class="mb-20">
                            <label class="text-14 fw-600 mb-8 d-block" data-i18n="manage.lastName">
                                Last name
                            </label>
                            <input id="mfLastName"
                                   class="border-light rounded-8 px-20 py-15"
                                   type="text"
                                   placeholder="Last name"
                                   data-i18n-placeholder="manage.lastNamePlaceholder">
                        </div>

                        <div id="mfError"
                             style="display:none"
                             class="mt-20"></div>

                        <button id="mfSubmitBtn"
                                type="button"
                                class="button h-60 col-12 rounded-8 bg-yellow-1 text-dark-1 fw-600"
                                data-i18n="manage.continue">
                            Continue
                        </button>
                        </form>
                    </div>

                    <div id="mfResultSection" style="display:none"></div>

                </div>
            </div>
        </div>
    </section>
    <div id="minimal-footer-placeholder"></div>
</main>

<div id="language-modal-placeholder"></div>

<script src="js/i18n/en.js"></script>
<script src="js/i18n/es.js"></script>
<script src="js/i18n/tr.js"></script>
<script src="js/i18n/i18n.js"></script>
<script src="js/vendors.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script src="js/manage-booking.js"></script>
<script src="js/auth-session.js"></script>
</body>
</html>
