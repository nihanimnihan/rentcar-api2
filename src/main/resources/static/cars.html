<!DOCTYPE html>
<html lang="en" data-x="html" data-x-toggle="html-overflow-hidden">

<head>
    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/vendors.css">
    <style>html,body{background-color:#191B1E}</style>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/cars.css">
    <link rel="stylesheet" href="css/components/alerts.css">
    <link rel="stylesheet" href="css/brand-theme.css?v=20260619-picker-polish">
    <link rel="stylesheet" href="css/auth-session.css">
    <link rel="stylesheet" href="css/places.css?v=20260619-cars-picker">
    <title>RentCar</title>
</head>

<body>

<main class="cars-page-main">


    <div class="header-margin"></div>
    <header data-add-bg="" class="header bg-dark-3 js-header" data-x="header" data-x-toggle="is-menu-opened">
        <div data-anim="fade" class="header__container px-30 sm:px-20">
            <div class="row justify-between items-center">

                <div class="col-auto">
                    <div class="d-flex items-center">
                        <a href="index.html" class="header-logo mr-20" data-x="header-logo" data-x-toggle="is-logo-dark">
                            <img src="img/general/car-paradise-logo.svg" alt="Rent Car Paradise Deluxe logo">
                            <img src="img/general/car-paradise-logo.svg" alt="Rent Car Paradise Deluxe logo">
                        </a>


                        <div class="header-menu " data-x="mobile-menu" data-x-toggle="is-menu-active">
                            <div class="mobile-overlay"></div>

                            <div class="header-menu__content">
                                <div class="mobile-bg js-mobile-bg"></div>
                                <div class="rentcar-booking-header">

                                    <div class="d-flex items-center">

                                        <!-- Booking summary -->
                                        <div
                                                id="headerBookingSummary"
                                                class="bg-white-10 text-white px-20 py-12 rounded-100">

                                            <div class="text-14 fw-500" id="headerRouteText">
                                                BCN Airport T1 → BCN Airport T1
                                            </div>
                                            <div class="text-13 opacity-7 mt-2" id="headerDateText">
                                                Sun 4 May 10:00 - Mon 5 May 10:00
                                            </div>
                                        </div>

                                        <button id="editSearchButton" class="button ml-15 size-40 rounded-full bg-white-10">
                                            <i class="icon-edit text-white"></i>
                                        </button>

                                    </div>

                                </div>
                                <div class="mobile-footer px-20 py-20 border-top-light js-mobile-footer">
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="col-auto">
                    <div class="d-flex items-center">

                        <button class="d-flex items-center text-14 text-white js-lang-toggle" type="button">
                            <img src="img/general/lang.png" alt="language" class="rounded-full mr-10">
                            <span class="js-language-mainTitle" data-current-language-label>English</span>
                            <i class="icon-chevron-sm-down text-7 ml-15"></i>
                        </button>

                        <div class="d-flex items-center ml-20 is-menu-opened-hide md:d-none">
                            <a href="signup.html" class="rc-header-auth-link" data-i18n="header.signIn">Sign In / Register</a>
                        </div>

                        <div class="d-none xl:d-flex x-gap-20 items-center pl-30 text-white" data-x="header-mobile-icons" data-x-toggle="text-white">
                            <div><a href="signup.html" class="d-flex items-center icon-user text-inherit text-22"></a></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <section id="carsSearchDrawer" class="cars-search-drawer">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="mainSearch -col-5 border-light bg-white px-20 py-20 lg:px-20 lg:pt-5 lg:pb-20 rounded-4 mt-30 rentcar-cars-search">
                        <div class="rcss-grid" id="rcssGrid">

                            <div class="rcss-cell rcss-cell-loc" id="rcssPickupLocCell">
                                <div class="rcss-cell-inner">
                                    <div class="rcss-label" data-i18n="search.pickUpLocation">Pick up location</div>
                                    <button type="button" class="rcss-trigger" id="rcssPickupLocBtn">
                                        <i class="icon-location-2 rcss-icon"></i>
                                        <span id="rcssPickupLocText">BCN Airport T1</span>
                                    </button>
                                    <div class="rcss-popup rcss-loc-popup" id="rcssPickupLocPopup" style="display:none;"></div>
                                    <input type="hidden" id="pickupLocation" value="BCN Airport T1">
                                </div>
                            </div>

                            <div class="rcss-cell rcss-cell-loc rcss-cell-loc--synced" id="rcssDropoffLocCell">
                                <div class="rcss-cell-inner">
                                    <div class="rcss-label" data-i18n="search.dropOffLocation">Drop off location</div>
                                    <button type="button" class="rcss-trigger" id="rcssDropoffLocBtn">
                                        <i class="icon-location-2 rcss-icon"></i>
                                        <span id="rcssDropoffLocText">BCN Airport T1</span>
                                    </button>
                                    <div class="rcss-popup rcss-loc-popup" id="rcssDropoffLocPopup" style="display:none;"></div>
                                    <input type="hidden" id="dropoffLocation" value="BCN Airport T1">
                                </div>
                            </div>

                            <div class="rcss-cell rcss-cell-date js-calendar-el" id="rcssPickupDateCell">
                                <div class="rcss-cell-inner">
                                    <div class="rcss-label" data-i18n="search.pickUp">Pick up</div>
                                    <div class="rcss-date-row">
                                        <button type="button" class="rcss-trigger rcss-date-btn" id="rcssPickupDateBtn">
                                            <i class="icon-calendar-2 rcss-icon"></i>
                                            <span id="pickupDateText" class="js-first-date" data-date="">Select date</span>
                                        </button>
                                        <span class="rcss-dot">·</span>
                                        <button type="button" class="rcss-trigger rcss-time-btn" id="rcssPickupTimeBtn">
                                            <span id="rcssPickupTimeDisplay">10:00</span>
                                        </button>
                                    </div>
                                    <div class="rcss-popup rcss-cal-popup" id="rcssPickupCalPopup" style="display:none;">
                                        <div class="rc-calendar-host"></div>
                                    </div>
                                    <div class="rcss-popup rcss-time-popup" id="rcssPickupTimePopup" style="display:none;">
                                        <div class="rcss-time-list" id="rcssPickupTimeList"></div>
                                    </div>
                                    <input type="hidden" id="pickupHour" value="10:00">
                                </div>
                            </div>

                            <div class="rcss-cell rcss-cell-date js-calendar-el" id="rcssDropoffDateCell">
                                <div class="rcss-cell-inner">
                                    <div class="rcss-label" data-i18n="search.dropOff">Drop off</div>
                                    <div class="rcss-date-row">
                                        <button type="button" class="rcss-trigger rcss-date-btn" id="rcssDropoffDateBtn">
                                            <i class="icon-calendar-2 rcss-icon"></i>
                                            <span id="dropoffDateText" class="js-first-date" data-date="">Select date</span>
                                        </button>
                                        <span class="rcss-dot">·</span>
                                        <button type="button" class="rcss-trigger rcss-time-btn" id="rcssDropoffTimeBtn">
                                            <span id="rcssDropoffTimeDisplay">10:00</span>
                                        </button>
                                    </div>
                                    <div class="rcss-popup rcss-cal-popup" id="rcssDropoffCalPopup" style="display:none;">
                                        <div class="rc-calendar-host"></div>
                                    </div>
                                    <div class="rcss-popup rcss-time-popup" id="rcssDropoffTimePopup" style="display:none;">
                                        <div class="rcss-time-list" id="rcssDropoffTimeList"></div>
                                    </div>
                                    <input type="hidden" id="dropoffHour" value="10:00">
                                </div>
                            </div>

                            <div class="rcss-cell rcss-cell-submit">
                                <button id="searchCarsButton" type="button" class="mainSearch__submit button -dark-1 py-20 px-35 col-12 rounded-4 bg-yellow-1 text-dark-1">
                                    <i class="icon-search text-20 mr-10"></i>
                                    <span data-i18n="search.showCars">Search</span>
                                </button>
                            </div>
                        </div>

                        <label class="rcss-diff-return">
                            <input type="checkbox" id="rcssDiffReturn">
                            <span data-i18n="search.returnDifferentLocation">Return to a different location</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Static container for date-validation errors — always in the DOM (never inside the async partial) -->
    <div id="carsDateError" class="container" style="display:none; padding-top:16px; padding-bottom:8px;"></div>
    <div id="car-filters-placeholder" class="cars-page-content"></div>
    <div id="minimal-footer-placeholder"></div>
</main>

<div id="language-modal-placeholder"></div>

<!-- JavaScript -->
<script src="js/i18n/en.js"></script>
<script src="js/i18n/es.js"></script>
<script src="js/i18n/tr.js"></script>
<script src="js/i18n/i18n.js"></script>
<script src="js/vendors.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js?v=20260619-filter-fix"></script>
<script src="js/rentcar-calendar.js"></script>
<script src="js/escape-html.js"></script>
<script src="js/main-search.js?v=20260619-picker-polish"></script>
<script src="js/config.js"></script>
<script src="js/maps-init.js"></script>
<script>
    window.initGooglePlaces = function () {
        window.dispatchEvent(new Event('google-places-ready'));
    };
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBR_2YHxCNRdMpMuJTA1J8WMznjAVA_IkQ&libraries=places&callback=initGooglePlaces" async defer></script>
<script src="js/price-details-modal.js"></script>
<script src="js/car-list.js"></script>
<script src="js/car-filters.js?v=20260619-filter-fix"></script>
<script src="js/auth-session.js"></script>
</body>

</html>
