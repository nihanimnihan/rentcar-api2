<!DOCTYPE html>
<html lang="en" data-x="html" data-x-toggle="html-overflow-hidden">

<head>
    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/vendors.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/cars.css">
    <link rel="stylesheet" href="css/components/alerts.css">
    <link rel="stylesheet" href="css/brand-theme.css">

    <title>RentCar</title>
</head>

<body>
<div id="preloader-placeholder"></div>

<main class="cars-page-main">


    <div class="header-margin"></div>
    <header data-add-bg="" class="header bg-dark-3 js-header" data-x="header" data-x-toggle="is-menu-opened">
        <div data-anim="fade" class="header__container px-30 sm:px-20">
            <div class="row justify-between items-center">

                <div class="col-auto">
                    <div class="d-flex items-center">
                        <a href="index.html" class="header-logo mr-20" data-x="header-logo" data-x-toggle="is-logo-dark">
                            <img src="img/general/logo-light.svg" alt="logo icon">
                            <img src="img/general/logo-dark-2.svg" alt="logo icon">
                        </a>


                        <div class="header-menu " data-x="mobile-menu" data-x-toggle="is-menu-active">
                            <div class="mobile-overlay"></div>

                            <div class="header-menu__content">
                                <div class="mobile-bg js-mobile-bg"></div>
                                <div class="rentcar-booking-header">

                                    <div class="d-flex items-center">

                                        <!-- Booking summary -->
                                        <div
                                                id="headerBookingSummary"
                                                class="bg-white-10 text-white px-20 py-12 rounded-100">

                                            <div class="text-14 fw-500" id="headerRouteText">
                                                BCN Airport T1 → BCN Airport T1
                                            </div>
                                            <div class="text-13 opacity-7 mt-2" id="headerDateText">
                                                Sun 4 May 10:00 - Mon 5 May 10:00
                                            </div>
                                        </div>

                                        <button id="editSearchButton" class="button ml-15 size-40 rounded-full bg-white-10">
                                            <i class="icon-edit text-white"></i>
                                        </button>

                                    </div>

                                </div>
                                <div class="mobile-footer px-20 py-20 border-top-light js-mobile-footer">
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="col-auto">
                    <div class="d-flex items-center">

                        <div class="row x-gap-20 items-center xxl:d-none">

                            <div class="col-auto">
                                <button class="d-flex items-center text-14 text-white js-lang-toggle" type="button">
                                    <img src="img/general/lang.png" alt="image" class="rounded-full mr-10">
                                    <span class="js-language-mainTitle">English</span>
                                    <i class="icon-chevron-sm-down text-7 ml-15"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex items-center ml-20 is-menu-opened-hide md:d-none">
                            <a href="signup.html" class="button px-30 fw-400 text-14 border-white -blue-1 h-50 text-white ml-20" data-i18n="header.logIn">Log In / Register</a>
                        </div>

                        <div class="d-none xl:d-flex x-gap-20 items-center pl-30 text-white" data-x="header-mobile-icons" data-x-toggle="text-white">
                            <div><a href="login.html" class="d-flex items-center icon-user text-inherit text-22"></a></div>
                            <div><button class="d-flex items-center icon-menu text-inherit text-20" data-x-click="html, header, header-logo, header-mobile-icons, mobile-menu"></button></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <section id="carsSearchDrawer" class="cars-search-drawer">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="mainSearch -col-5 border-light bg-white px-20 py-20 lg:px-20 lg:pt-5 lg:pb-20 rounded-4 mt-30">
                        <div class="button-grid items-center">

                            <div class="searchMenu-loc pr-30 pl-10 lg:py-20 lg:px-0 js-form-dd js-liverSearch">

                                <div data-x-dd-click="searchMenu-loc">
                                    <h4 class="text-15 fw-500 ls-2 lh-16" data-i18n="search.pickUpLocation">Pick up location</h4>

                                    <div class="text-15 text-light-1 ls-2 lh-16">
                                    <input id="pickupLocation" autocomplete="off" type="search" placeholder="City or Airport" data-i18n-placeholder="search.cityOrAirport" class="js-search js-dd-focus" readonly />
                                    </div>
                                </div>


                                <div class="searchMenu-loc__field shadow-2 js-popup-window" data-x-dd="searchMenu-loc" data-x-dd-toggle="-is-active">
                                    <div class="bg-white px-30 py-30 sm:px-0 sm:py-15 rounded-4">
                                        <div class="y-gap-5 js-results">

                                            <div>
                                                <button class="-link d-block col-12 text-left rounded-4 px-20 py-15 js-search-option">
                                                    <div class="d-flex">
                                                        <div class="icon-location-2 text-light-1 text-20 pt-4"></div>
                                                        <div class="ml-10">
                                                            <div class="text-15 lh-12 fw-500 js-search-option-target">BCN Airport T1</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            </div>

                                            <div>
                                                <button class="-link d-block col-12 text-left rounded-4 px-20 py-15 js-search-option">
                                                    <div class="d-flex">
                                                        <div class="icon-location-2 text-light-1 text-20 pt-4"></div>
                                                        <div class="ml-10">
                                                            <div class="text-15 lh-12 fw-500 js-search-option-target">BCN Airport T2</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            </div>

                                            <div>
                                                <button class="-link d-block col-12 text-left rounded-4 px-20 py-15 js-search-option">
                                                    <div class="d-flex">
                                                        <div class="icon-location-2 text-light-1 text-20 pt-4"></div>
                                                        <div class="ml-10">
                                                            <div class="text-15 lh-12 fw-500 js-search-option-target">Office</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>


                            <div class="searchMenu-loc px-30 lg:py-20 lg:px-0 js-form-dd js-liverSearch">

                                <div data-x-dd-click="searchMenu-loc">
                                    <h4 class="text-15 fw-500 ls-2 lh-16" data-i18n="search.dropOffLocation">Drop off location</h4>

                                    <div class="text-15 text-light-1 ls-2 lh-16">
                                    <input id="dropoffLocation" autocomplete="off" type="search" placeholder="City or Airport" data-i18n-placeholder="search.cityOrAirport" class="js-search js-dd-focus" readonly />
                                    </div>
                                </div>


                                <div class="searchMenu-loc__field shadow-2 js-popup-window" data-x-dd="searchMenu-loc" data-x-dd-toggle="-is-active">
                                    <div class="bg-white px-30 py-30 sm:px-0 sm:py-15 rounded-4">
                                        <div class="y-gap-5 js-results">

                                            <div>
                                                <button class="-link d-block col-12 text-left rounded-4 px-20 py-15 js-search-option">
                                                    <div class="d-flex">
                                                        <div class="icon-location-2 text-light-1 text-20 pt-4"></div>
                                                        <div class="ml-10">
                                                            <div class="text-15 lh-12 fw-500 js-search-option-target">BCN Airport T1</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            </div>

                                            <div>
                                                <button class="-link d-block col-12 text-left rounded-4 px-20 py-15 js-search-option">
                                                    <div class="d-flex">
                                                        <div class="icon-location-2 text-light-1 text-20 pt-4"></div>
                                                        <div class="ml-10">
                                                            <div class="text-15 lh-12 fw-500 js-search-option-target">BCN Airport T2</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            </div>

                                            <div>
                                                <button class="-link d-block col-12 text-left rounded-4 px-20 py-15 js-search-option">
                                                    <div class="d-flex">
                                                        <div class="icon-location-2 text-light-1 text-20 pt-4"></div>
                                                        <div class="ml-10">
                                                            <div class="text-15 lh-12 fw-500 js-search-option-target">Office</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="searchMenu-date px-30 lg:py-20 lg:px-0 js-form-dd js-calendar js-calendar-el">
                                <div data-x-dd-click="searchMenu-date">
                                    <h4 class="text-15 fw-500 ls-2 lh-16" data-i18n="search.pickUp">Pick up</h4>

                                    <div class="d-flex items-center x-gap-10 capitalize text-15 text-light-1 ls-2 lh-16">
                                        <span id="pickupDateText" class="js-first-date" data-i18n="search.selectDate">Select date</span>

                                        <select id="pickupHour" class="text-15 text-light-1" style="border:none; outline:none; background:white;">
                                            <option value="09:00">09:00</option>
                                            <option value="10:00" selected>10:00</option>
                                            <option value="11:00">11:00</option>
                                            <option value="12:00">12:00</option>
                                            <option value="13:00">13:00</option>
                                            <option value="14:00">14:00</option>
                                            <option value="15:00">15:00</option>
                                            <option value="16:00">16:00</option>
                                            <option value="17:00">17:00</option>
                                            <option value="18:00">18:00</option>
                                            <option value="19:00">19:00</option>
                                            <option value="20:00">20:00</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="searchMenu-date__field shadow-2" data-x-dd="searchMenu-date" data-x-dd-toggle="-is-active">
                                    <div class="bg-white px-30 py-30 rounded-4">
                                        <div class="rc-calendar-host"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="searchMenu-date px-30 lg:py-20 lg:px-0 js-form-dd js-calendar js-calendar-el">
                                <div data-x-dd-click="searchMenu-date">
                                    <h4 class="text-15 fw-500 ls-2 lh-16" data-i18n="search.dropOff">Drop off</h4>

                                    <div class="d-flex items-center x-gap-10 capitalize text-15 text-light-1 ls-2 lh-16">
                                        <span id="dropoffDateText" class="js-first-date" data-i18n="search.selectDate">Select date</span>

                                        <select id="dropoffHour" class="text-15 text-light-1" style="border:none; outline:none; background:white;">
                                            <option value="09:00">09:00</option>
                                            <option value="10:00" selected>10:00</option>
                                            <option value="11:00">11:00</option>
                                            <option value="12:00">12:00</option>
                                            <option value="13:00">13:00</option>
                                            <option value="14:00">14:00</option>
                                            <option value="15:00">15:00</option>
                                            <option value="16:00">16:00</option>
                                            <option value="17:00">17:00</option>
                                            <option value="18:00">18:00</option>
                                            <option value="19:00">19:00</option>
                                            <option value="20:00">20:00</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="searchMenu-date__field shadow-2" data-x-dd="searchMenu-date" data-x-dd-toggle="-is-active">
                                    <div class="bg-white px-30 py-30 rounded-4">
                                        <div class="rc-calendar-host"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="button-item">
                                <button id="searchCarsButton" class="mainSearch__submit button -dark-1 py-20 px-35 col-12 rounded-4 bg-yellow-1 text-dark-1">
                                    <i class="icon-search text-20 mr-10"></i>
                                    <span data-i18n="search.showCars">Search</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Static container for date-validation errors — always in the DOM (never inside the async partial) -->
    <div id="carsDateError" class="container" style="display:none; padding-top:16px; padding-bottom:8px;"></div>
    <div id="car-filters-placeholder" class="cars-page-content"></div>
    <div id="minimal-footer-placeholder"></div>
</main>

<div id="language-modal-placeholder"></div>

<!-- JavaScript -->
<script src="js/i18n/en.js"></script>
<script src="js/i18n/es.js"></script>
<script src="js/i18n/i18n.js"></script>
<script src="js/vendors.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script src="js/rentcar-calendar.js"></script>
<script src="js/escape-html.js"></script>
<script src="js/main-search.js"></script>
<script src="js/price-details-modal.js"></script>
<script src="js/car-list.js"></script>
<script src="js/car-filters.js"></script>
</body>

</html>
