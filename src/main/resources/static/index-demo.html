<!DOCTYPE html>
<html>
<head>
    <title>RentCar MVP</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h2>Cars</h2>
<div id="cars"></div>
<script>
    fetch("http://localhost:8081/api/cars")
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById("cars");
            data.forEach(car => {
                container.innerHTML += `
                    <div class="card mb-3 p-3" style="width: 22rem;">
                        <img src="${car.imageUrl}" class="card-img-top" alt="${car.brand} ${car.model}">
                        <div class="card-body">
                            <h5 class="card-title">${car.brand} ${car.model}</h5>
                            <p class="card-text">€${car.dailyPrice} / day</p>
                            <button class="btn btn-primary" onclick="book(${car.id})">Book</button>
                        </div>
                    </div>
                `;
            });
        });

    function book(carId) {
        fetch("http://localhost:8081/api/bookings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                carId: carId,
                customerName: "Nihan",
                customerEmail: "nihan@test.com",
                customerPhone: "+34600000000",
                pickupDateTime: "2026-05-28T10:00:00",
                dropoffDateTime: "2026-05-29T12:00:00"
            })
        })
        .then(res => res.json())
        .then(data => {
            alert("Booking created: " + data.id);

            fetch(`http://localhost:8081/api/bookings/${data.id}/payments/process`, {
                method: "POST"
            })
            .then(res => res.json())
            .then(b => alert("Payment status: " + b.status));
        });
    }
</script>

</body>
</html>
