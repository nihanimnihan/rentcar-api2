<!DOCTYPE html>
<html lang="en" data-x="html" data-x-toggle="html-overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/vendors.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/brand-theme.css">

    <title>RentCar - Add-ons</title>
</head>

<body>
<div id="preloader-placeholder"></div>

<main>
    <section class="py-20 bg-dark-3">
        <div class="container">
            <div class="row justify-between items-center">
                <div class="col-auto">
                    <div class="d-flex items-center">
                        <button type="button"
                                onclick="history.back()"
                                class="button -blue-1 size-40 rounded-full bg-white-10 mr-15 text-white">
                            <i class="icon-arrow-left text-18"></i>
                        </button>

                        <a href="index.html" class="header-logo">
                            <img src="img/general/logo-light.svg" alt="RentCar logo">
                        </a>
                    </div>
                </div>

                <div class="col-auto">
                    <div class="d-flex items-center x-gap-20 text-white">
                        <div>
                            <span class="text-15 fw-600" data-i18n="addon.totalLabel">Total:</span>
                            <span id="addonsHeaderTotal" class="text-26 fw-800">€-</span>

                            <button type="button"
                                    id="addonsPriceDetailsButton"
                                    class="d-block text-14 fw-600 underline text-white">
                                <span data-i18n="addon.priceDetails">Price details</span>
                            </button>
                        </div>

                        <button id="continueButton"
                                type="button"
                                class="button h-60 px-50 bg-yellow-1 text-dark-1 rounded-8 fw-700">
                            <span data-i18n="addon.continue">Continue</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="layout-pt-md layout-pb-md bg-white">
        <div class="container">
            <div class="row x-gap-60 y-gap-40">

                <div class="col-lg-8">

                    <div id="addonsList" class="y-gap-20">
                        <!-- Add-ons are loaded dynamically from /api/addons/active -->
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="rentcar-addon-summary">
                        <div class="d-flex items-center mb-20">
                            <img
                                    id="summaryCarImage"
                                    class="rentcar-summary-car-image"
                                    src=""
                                    alt=""
                            >

                            <div>
                                <h3 id="summaryCarName" class="rentcar-summary-title">Car</h3>
                                <div id="summaryCarSubtitle" class="rentcar-summary-subtitle">
                                    or similar
                                </div>
                            </div>
                        </div>

                        <div class="rentcar-summary-divider"></div>

                        <div class="rentcar-summary-route">
                            <div>
                                <div class="rentcar-summary-section-label" data-i18n="summary.pickup">PICK UP</div>
                                <div id="summaryPickupLocation" class="rentcar-summary-main-text">-</div>
                                <div id="summaryPickupDate" class="rentcar-summary-muted-text">-</div>
                            </div>

                            <div class="rentcar-summary-arrow">↓</div>

                            <div>
                                <div class="rentcar-summary-section-label" data-i18n="summary.return">DROP OFF</div>
                                <div id="summaryDropoffLocation" class="rentcar-summary-main-text">-</div>
                                <div id="summaryDropoffDate" class="rentcar-summary-muted-text">-</div>
                            </div>
                        </div>

                        <div class="rentcar-summary-divider"></div>

                        <div>
                            <div class="rentcar-summary-section-label" data-i18n="summary.addedIncludedFeatures">
                                INCLUDED
                            </div>

                            <div id="summaryIncludedFeatures"
                                 class="rentcar-summary-included-list">
                            </div>
                        </div>

                        <div class="rentcar-summary-divider"></div>

                        <div>
                            <div class="rentcar-summary-section-label" data-i18n="summary.addedFeatures">ADDED ADD-ONS</div>
                            <div id="summaryAddedFeatures" class="rentcar-summary-added-list" data-i18n="summary.noAddons">
                                No add-ons selected yet.
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>
</main>

<script src="js/i18n/en.js"></script>
<script src="js/i18n/es.js"></script>
<script src="js/i18n/tr.js"></script>
<script src="js/i18n/i18n.js"></script>
<script src="js/vendors.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script src="js/escape-html.js"></script>
<script src="js/price-details-modal.js"></script>
<script src="js/booking-summary.js"></script>
<script src="js/addons.js"></script>
</body>
</html>
