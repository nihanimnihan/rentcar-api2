<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booking profile — RentCar</title>
  <link rel="stylesheet" href="css/vendors.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/brand-theme.css">
  <link rel="stylesheet" href="css/user-area.css">
</head>
<body>
  <header class="rc-user-header">
    <div style="display:flex;align-items:center;gap:18px">
      <a class="rc-logo" href="/index.html" style="color:inherit;text-decoration:none;font-weight:700;font-size:18px">RentCar</a>
    </div>

    <div class="rc-user-menu">
      <button class="rc-user-menu__button">Hi, <span id="rc-user-name"></span> ▾</button>
      <div class="rc-user-menu__dropdown">
        <a href="/profile.html">Profile</a>
        <a href="/bookings.html">My bookings</a>
        <button data-ua-logout class="rc-logout">Logout</button>
      </div>
    </div>
  </header>

  <nav class="rc-tabs">
    <a id="tab-profile" href="/profile.html" class="rc-tab">Profile</a>
    <a id="tab-bookings" href="/bookings.html" class="rc-tab">My bookings</a>
  </nav>

  <main class="rc-container rc-profile-page">
    <div class="rc-card rc-profile-card">
      <div class="rc-profile-inner">
      <h1 data-i18n="profile.title">Booking profile</h1>
      <form id="profileForm" class="rc-profile-form">
        <div class="rc-grid rc-profile-grid">
          <div class="rc-field">
            <label data-i18n="profile.firstName">First name</label>
            <input readonly data-ua-firstName id="firstName" />
          </div>
          <div class="rc-field">
            <label data-i18n="profile.lastName">Last name</label>
            <input readonly data-ua-lastName id="lastName" />
          </div>
          <div class="rc-field rc-field--full">
            <label data-i18n="profile.email">Email</label>
            <input readonly data-ua-email id="email" />
          </div>
          <div class="rc-field">
            <label data-i18n="profile.phoneCountryCode">Country code</label>
            <select data-ua-phone-country-code id="phoneCountryCode">
              <option value="">Code</option>
              <option value="+34">Spain +34</option>
              <option value="+90">Turkey +90</option>
              <option value="+44">United Kingdom +44</option>
              <option value="+33">France +33</option>
              <option value="+49">Germany +49</option>
              <option value="+39">Italy +39</option>
              <option value="+31">Netherlands +31</option>
              <option value="+351">Portugal +351</option>
              <option value="+1">United States +1</option>
            </select>
          </div>
          <div class="rc-field">
            <label data-i18n="profile.phoneNumber">Phone number</label>
            <input data-ua-phone-number id="phoneNumber" maxlength="24" />
          </div>
        </div>

        <div class="rc-actions">
          <button type="button" id="saveProfile" class="rc-save" data-i18n="profile.save">Save</button>
        </div>
      </form>

      <div class="rc-profile-section">
        <h3 data-i18n="membership.title">RentCar membership</h3>
        <div class="rc-membership-row">
          <div class="rc-membership-label" data-i18n="membership.memberNumber">Member number</div>
          <div class="rc-membership-number" data-ua-customerNumber id="memberNumber">—</div>
        </div>
      </div>

      <div id="profileMessage" class="rc-profile-message"></div>
      </div>
    </div>
  </main>
 
 <!-- i18n: load before page scripts that call translations -->
 <script src="js/i18n/en.js"></script>
 <script src="js/i18n/es.js"></script>
 <script src="js/i18n/tr.js"></script>
 <script src="js/i18n/i18n.js"></script>

 <script src="js/user-area.js"></script>
 <script>
   async function showProfileMessage(text, isError) {
     const el = document.getElementById('profileMessage');
     el.textContent = text;
     el.style.color = isError ? '#a33' : '#2a7a2a';
     el.style.background = isError ? '#fff0f0' : '#f0fff0';
     el.style.padding = '8px 12px';
     el.style.borderRadius = '6px';
     setTimeout(() => { el.style.opacity = '1'; }, 10);
     if (!isError) setTimeout(() => { el.style.opacity = '0'; }, 3000);
   }

   document.getElementById('saveProfile').addEventListener('click', async function(){
     const phoneCountryCode = document.getElementById('phoneCountryCode').value;
     const phoneNumber = document.getElementById('phoneNumber').value;
     const firstName = document.getElementById('firstName').value;
     const lastName = document.getElementById('lastName').value;
     try{
       const res = await fetch('/api/auth/profile',{method:'POST', credentials:'same-origin', headers:{'Content-Type':'application/json'}, body: JSON.stringify({firstName, lastName, phoneCountryCode, phoneNumber})});
       if (res.ok) {
         const data = await res.json();
         showProfileMessage('Profile updated successfully.', false);
         // update member number if returned
         if (data && data.customerNumber) {
           document.querySelector('[data-ua-customerNumber]').textContent = data.customerNumber;
         }
       } else {
         let body = {};
         try { body = await res.json(); } catch(e) {}
         const msg = body && body.message ? body.message : 'Unable to save profile. Please check the fields and try again.';
         showProfileMessage(msg, true);
       }
     }catch(e){
       showProfileMessage('Unable to save profile. Please check the fields and try again.', true);
     }
   });

   // Add Delete Account button behavior (non-destructive; show "Coming soon")
   (function(){
     // Insert Delete Account button into the card after membership section
     var card = document.querySelector('.rc-card');
     if (card) {
       var container = document.createElement('div');
       container.className = 'rc-profile-section rc-profile-section--danger';
       container.innerHTML = `
         <h3 data-i18n="profile.deleteAccount">Delete account</h3>
         <div class="rc-profile-section-actions">
           <button id="deleteAccountBtn" class="rc-outline-danger" data-i18n="profile.deleteAccount">Delete Account</button>
         </div>
       `;
       var inner = document.querySelector('.rc-profile-inner') || card;
       inner.appendChild(container);
       // Ensure newly injected nodes get translated immediately
       if (window.applyTranslations) window.applyTranslations(container);
       var btn = document.getElementById('deleteAccountBtn');
       if (btn) btn.addEventListener('click', function(){
         var msg = (typeof window.t === 'function') ? window.t('coming.soon') : 'Coming soon';
         showProfileMessage(msg, false);
       });
     }
   }());
 </script>
</body>
</html>
