<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OAuth callback</title>
</head>
<body>
<script>
(function(){
  try {
    const params = new URLSearchParams(window.location.search);
    const profileComplete = params.get('profileComplete') === 'true';
    const returnTo = params.get('returnTo') || '/index.html';
    const payload = { type: 'oauth', profileComplete: profileComplete, returnTo: returnTo };

    // Only post to opener if same-origin to avoid cross-origin leaks
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage(payload, window.location.origin);
      } catch (e) {
        // ignore
      }
    }
  } catch (e) {
    // ignore
  }
  // Close the popup after a short delay to allow postMessage to be dispatched
  setTimeout(() => window.close(), 300);
})();
</script>
</body>
</html>
