<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | Paradise Deluxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand-theme.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-login-body">
  <main class="admin-login-shell">
    <section class="admin-login-panel" aria-labelledby="admin-login-title">
      <img class="admin-login-logo" src="/img/general/deluxelogo.png" alt="Rent Car Paradise Deluxe">
      <div class="admin-login-heading">
        <p class="admin-login-kicker">Secure admin access</p>
        <h1 id="admin-login-title">Paradise Deluxe Admin</h1>
      </div>

      <div id="login-error" class="admin-login-alert" hidden>
        We could not sign you in. Please check your admin username and password.
      </div>
      <div id="forbidden-error" class="admin-login-alert" hidden>
        Your account is signed in, but it does not have admin access.
      </div>
      <div id="logout-message" class="admin-login-alert admin-login-alert--success" hidden>
        You have been logged out.
      </div>

      <form class="admin-login-form" method="post" action="/admin-login">
        <div class="admin-login-field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div class="admin-login-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="admin-login-button" type="submit">Sign in</button>
      </form>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('login-error').hidden = params.get('error') !== 'true';
    document.getElementById('forbidden-error').hidden = params.get('error') !== 'forbidden';
    document.getElementById('logout-message').hidden = params.get('logout') !== 'true';
  </script>
</body>
</html>
