<svg width="430" height="92" viewBox="0 0 430 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Rent Car Paradise Deluxe</title>
