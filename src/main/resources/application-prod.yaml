server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

stripe:
  api-key: ${STRIPE_API_KEY}

rentcar:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}