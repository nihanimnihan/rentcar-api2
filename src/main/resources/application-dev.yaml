server:
  port: 8091

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - openid
              - profile
              - email
  datasource:
    url: jdbc:postgresql://localhost:5432/rentcar
    username: rentcar
    password: rentcar
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

rentcar:
  admin:
    username: admin
    password: admin

app:
  public-base-url: http://localhost:8091
