server:
  port: 8091
  mail:
    host: localhost
    port: 1025
    username:
    password:

# Local PostgreSQL datasource configuration.
# Values can be overridden with SPRING_DATASOURCE_* environment variables.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rentcar}
    username: ${SPRING_DATASOURCE_USERNAME:rentcar}
    password: ${SPRING_DATASOURCE_PASSWORD:rentcar}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
