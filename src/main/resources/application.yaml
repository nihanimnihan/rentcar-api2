spring:
  profiles:
    active: dev
  jackson:
    # Serialize Instant/LocalDateTime as ISO-8601 strings, not epoch milliseconds.
    serialization:
      write-dates-as-timestamps: false
    # Audit timestamps (Instant) are serialized as UTC; pickup/dropoff (LocalDateTime) have no offset.
    time-zone: UTC
  jpa:
    properties:
      hibernate:
        # Ensure Hibernate sends and reads all datetime values as UTC to/from the JDBC driver.
        # This prevents silent timezone shifts when the DB server or JVM default zone differs.
        jdbc:
          time_zone: UTC
  # Centralized OAuth2 client configuration using environment variables only. Do NOT commit secrets.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}

# Stripe keys via environment variables only
stripe:
  api-key: ${STRIPE_API_KEY:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# Local fallback admin credentials — overridden by prod with required env vars.
# Prod profile replaces these with ${ADMIN_USERNAME} / ${ADMIN_PASSWORD} env vars.
rentcar:
  admin:
    username: admin
    password: change-me
  pricing:
    discount-tiers:
      - min-days: 1
        discount-percentage: 0
      - min-days: 3
        discount-percentage: 5
      - min-days: 7
        discount-percentage: 10
      - min-days: 14
        discount-percentage: 15
      - min-days: 28
        discount-percentage: 25 #35
    # Closed list of pickup locations that carry a premium location surcharge.
    # Matching is exact (case-insensitive). Add new locations here — never use substring rules.
    premium-locations:
      - BCN Airport T1
      - BCN Airport T2
  mileage:
    daily-km-base: 300          # km/day for days 1..baseDayThreshold
    km-per-extra-day: 150       # km/day for each day beyond baseDayThreshold
    base-day-threshold: 7       # boundary between full-rate and reduced-rate days
    unlimited-km-percentage: 0.10          # 10% of effective daily price
    unlimited-km-min-daily-price: 4.70     # floor — never charge less than this
  manage-booking-token:
    ttl-days: ${RENTCAR_MANAGE_BOOKING_TOKEN_TTL_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always   # exposes DB connectivity status in health response
